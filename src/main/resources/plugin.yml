main: com.blockmart.skillmaster.SkillMaster
name: SkillMaster
version: '1.0.0-SNAPSHOT'
api-version: '1.20'
author: BlockMart
softdepend:
  - PlaceholderAPI
  - MythicMobs
  - Vault
  - Citizens
  - LuckPerms
  - ProtocolLib
commands:
  skill:
    description: SkillMaster base command.
    usage: /skill <skillname> level
    permission: skillmaster.command.skill
permissions:
  skillmaster.command.skill:
    description: Allows use of the /skill command.
    default: op
  skillmaster.admin:
    description: Grants all SkillMaster administrative permissions.
    default: op
